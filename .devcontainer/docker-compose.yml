services:

  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    container_name: vsc-mcp
    volumes:
    - type: bind
      source: ..
      target: /vsc-mcp
      consistency: cached
    - type: bind
      source: ${HOME}/.ssh
      target: /home/vscode/.ssh
      read_only: true
    - type: bind
      source: ${HOME}/.kube
      target: /home/vscode/.kube
      read_only: true
    - type: bind
      source: ${HOME}/.gitconfig
      target: /home/vscode/.gitconfig
      consistency: cached
    - type: bind
      source: ${HOME}/.cline
      target: /home/vscode/.cline
      read_only: false
    ports:
      - "9876:9876"
    command: ["sleep", "infinity"]

